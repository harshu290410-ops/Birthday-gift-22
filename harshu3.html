<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday My Love!</title>
    <style>
        :root {
            --dark-pink: #800f2f;
            --deep-rose: #c9184a;
            --hot-pink: #ff4d6d;
            --soft-pink: #fff0f3;
            --gold-sparkle: #ffb703;
        }

        body {
            background-color: var(--soft-pink);
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
            cursor: crosshair;
        }

        /* Mouse Trail Particle Style */
        .sparkle-trail {
            position: fixed;
            pointer-events: none;
            z-index: 9999;
            font-size: 20px;
            animation: fallFade 1s forwards;
        }

        @keyframes fallFade {
            0% { transform: translateY(0) scale(1); opacity: 1; }
            100% { transform: translateY(50px) scale(0); opacity: 0; }
        }

        h1 {
            color: var(--dark-pink);
            font-size: clamp(2rem, 8vw, 3.5rem);
            margin: 10px 0;
            text-shadow: 2px 2px 0px white, 4px 4px 0px var(--hot-pink);
            animation: titlePulse 2s ease-in-out infinite;
        }

        @keyframes titlePulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        /* Toy & Bear Container */
        .toys-row {
            display: flex;
            gap: 25px;
            font-size: 50px;
            margin-bottom: 20px;
        }

        .toy { animation: toyJump 3s ease-in-out infinite; }
        .toy:nth-child(2) { animation-delay: 0.2s; }
        .toy:nth-child(3) { animation-delay: 0.4s; }

        @keyframes toyJump {
            0%, 20%, 50%, 80%, 100% {transform: translateY(0);}
            40% {transform: translateY(-20px);}
            60% {transform: translateY(-10px);}
        }

        /* 3D Gift Box */
        .gift-container {
            perspective: 1000px;
            cursor: pointer;
            position: relative;
        }

        .gift-box {
            width: 140px;
            height: 120px;
            background: var(--deep-rose);
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.3s;
            border-radius: 8px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }

        .gift-container:hover .gift-box {
            transform: scale(1.1) rotateY(10deg);
        }

        .gift-box::after { /* Vertical Ribbon */
            content: '';
            position: absolute;
            width: 20px;
            height: 100%;
            background: var(--gold-sparkle);
            left: 50%;
            transform: translateX(-50%);
            box-shadow: inset 0 0 5px rgba(0,0,0,0.2);
        }

        .lid {
            width: 154px;
            height: 30px;
            background: var(--dark-pink);
            position: absolute;
            top: -20px;
            left: -7px;
            z-index: 10;
            transition: 0.8s all cubic-bezier(0.68, -0.55, 0.27, 1.55);
        }

        .lid::before {
            content: '🎀';
            position: absolute;
            top: -35px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 40px;
        }

        /* The Animated Letter */
        .letter {
            width: 320px;
            background: white;
            padding: 30px;
            border: 4px solid var(--dark-pink);
            border-radius: 10px;
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translate(-50%, 0) scale(0);
            opacity: 0;
            transition: 1s all cubic-bezier(0.175, 0.885, 0.32, 1.2);
            z-index: 1;
            box-shadow: 0 10px 50px rgba(0,0,0,0.3);
        }

        .gift-container.open .lid {
            transform: translateY(-200px) rotateX(90deg);
            opacity: 0;
        }

        .gift-container.open .letter {
            transform: translate(-50%, -150px) scale(1);
            opacity: 1;
        }

        .instruction {
            color: var(--dark-pink);
            font-weight: bold;
            margin-top: 15px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* Floating Confetti Elements */
        .confetti {
            position: fixed;
            width: 10px;
            height: 10px;
            background-color: var(--hot-pink);
            z-index: 5;
            animation: confettiFall 4s ease-in forwards;
        }

        @keyframes confettiFall {
            0% { transform: translateY(-10vh) rotate(0deg); opacity: 1; }
            100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
        }
    </style>
</head>
<body>

    <h1>Happy Birthday Wifey!</h1>
    
    <div class="toys-row">
        <div class="toy">🧸</div>
        <div class="toy">🐈</div>
        <div class="toy">💖</div>
    </div>

    <div class="gift-container" onclick="openGift()">
        <div class="lid"></div>
        <div class="gift-box"></div>
        <p class="instruction">Tap to Open Magic 🪄</p>
        
        <div class="letter">
            <h3 style="color: var(--dark-pink); margin-top:0;">My Dearest Wifey,</h3>
            <p>Happy Birthday! May your day be as sparkling as your smile. 🌟</p>
            <p>I’m so lucky to have you. I'll always hold your hand and keep you happy forever. Love you tons, babe!</p>
            <p style="font-weight: bold; font-style: italic;">— Your Harshu ❤️</p>
        </div>
    </div>

    <script>
        // Effect 1: Mouse Trail
        document.addEventListener('mousemove', (e) => {
            const star = document.createElement('div');
            star.innerHTML = '✨';
            star.className = 'sparkle-trail';
            star.style.left = e.clientX + 'px';
            star.style.top = e.clientY + 'px';
            star.style.color = ['#ff4d6d', '#ffb703', '#c9184a'][Math.floor(Math.random()*3)];
            document.body.appendChild(star);
            
            setTimeout(() => star.remove(), 1000);
        });

        // Effect 2: Open Gift & Confetti Cannon
        function openGift() {
            const container = document.querySelector('.gift-container');
            if(!container.classList.contains('open')) {
                container.classList.add('open');
                document.querySelector('.instruction').style.display = 'none';
                
                // Fire Confetti
                for(let i = 0; i < 60; i++) {
                    createConfetti();
                }
            }
        }

        function createConfetti() {
            const colors = ['#ff4d6d', '#ffb3c1', '#800f2f', '#ffb703', '#ffffff'];
            const confetti = document.createElement('div');
            confetti.className = 'confetti';
            confetti.style.left = Math.random() * 100 + 'vw';
            confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
            confetti.style.width = Math.random() * 12 + 5 + 'px';
            confetti.style.height = confetti.style.width;
            confetti.style.animationDuration = Math.random() * 3 + 2 + 's';
            confetti.style.opacity = Math.random();
            document.body.appendChild(confetti);
            
            setTimeout(() => confetti.remove(), 4000);
        }
    </script>
</body>
</html>
